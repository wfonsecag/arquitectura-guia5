name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest -q || true; fi

      - name: Lint (optional)
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 . || true; fi

  ci-docs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload CI evidence (placeholder)
        run: echo "Replace this step with deployment or artifact upload steps"

# Nota:
# - Este workflow se dispara en cada push o PR a `main`/`master`.
# - Para evidenciar el flujo, añade pasos concretos de build/test/deploy según tu proyecto.